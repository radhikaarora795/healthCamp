<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Health Camp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f0f6ff 0%, #d9e8ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 18px 50px rgba(0,0,0,0.12);
            width: 360px;
            padding: 32px;
            text-align: center;
        }
        h1 { margin-bottom: 8px; color: #1b3d80; }
        p { margin-top: 0; color: #5a6578; }
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #1f6feb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .message {
            margin-top: 16px;
            color: #d64545;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <p>Enter credentials to continue.</p>
        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" type="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="message">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
    </div>
</body>
</html>
